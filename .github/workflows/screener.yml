name: Hedge Fund Stock Screener

on:
  schedule:
    # Morning run — 01:00 UTC Mon–Fri (1hr after ASX opens, covers DST shifts)
    - cron: "0 1 * * 1-5"
    # Afternoon run — 05:00 UTC Mon–Fri (1hr before ASX closes, covers DST shifts)
    - cron: "0 5 * * 1-5"
    # Price fetch — 21:30 UTC Mon–Fri (30min after NYSE closes at 21:00 UTC summer)
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI with optional run-type selection
    inputs:
      run_type:
        description: "Run type (morning, afternoon, or price_fetch)"
        required: false
        default: "morning"

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials.json from secret
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Write .env file from secrets
        run: |
          cat <<EOF > .env
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          CREDENTIALS_FILE=credentials.json
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          ENABLE_SLACK_ALERTS=${{ secrets.ENABLE_SLACK_ALERTS }}
          PRICE_FETCH_DELAY_MINUTES=15
          EOF

      - name: Determine run type
        id: run_type
        run: |
          # Manual trigger: use the input value
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.run_type }}" >> $GITHUB_OUTPUT
          # Scheduled: pick run type based on UTC hour
          elif [ "$(date -u +%H)" = "01" ]; then
            echo "type=morning" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" -ge "21" ]; then
            echo "type=price_fetch" >> $GITHUB_OUTPUT
          else
            echo "type=afternoon" >> $GITHUB_OUTPUT
          fi

      - name: Run stock screener or price fetch
        run: |
          if [ "${{ steps.run_type.outputs.type }}" = "price_fetch" ]; then
            python price_tracker.py
          else
            python main.py --run-type ${{ steps.run_type.outputs.type }}
          fi

      - name: Upload CSV backup as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-csv-${{ steps.run_type.outputs.type }}-${{ github.run_id }}
          path: "*.csv"
          retention-days: 30

      - name: Upload run history as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-history-${{ github.run_id }}
          path: run_history.json
          retention-days: 30
